services:
  db:
    image: postgres:18-alpine
    restart: always
    container_name: lms_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgresql_data:/var/lib/postgresql

volumes:
  postgresql_data: